site_name: SEDICOMM Signal
site_description: СЭДИКОММ Сигнал — информационное агентство Университета СЭДИКОММ о технологиях, которые меняют образование, профессию и будущее IT

site_url: https://news4git.github.io/

theme:
  name: material
  custom_dir: overrides
  language: ru
  features:
    - navigation.footer
    - search.suggest
  font:
    text: Open Sans

plugins:
  - search
  - meta-descriptions:
      enable_checks: true
      min_length: 50      # Minimum character count
      max_length: 160     # Maximum (SEO recommended)
      trim: true          # Auto-trim if exceeded

markdown_extensions:
  - meta

site_author: SEDICOMM Signal
copyright: Copyright &copy; 2013 - 2026 News 4 Git
